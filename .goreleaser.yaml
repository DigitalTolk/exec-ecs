project_name: exec-ecs
version: 2

before:
  hooks:
    # Ensures the go.mod file is tidy before building
    - go mod tidy
    # Runs Go generate commands
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X ecs-tool/installer.Version=v{{ .Version }}

archives:
  - formats:
      - tar.gz
    # Name template that uses the project name and OS/Arch
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    # Use zip for Windows archives
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: DigitalTolk
    name: exec-ecs
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
