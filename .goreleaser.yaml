project_name: exec-ecs
version: 2

before:
  hooks:
    # Ensures the go.mod file is tidy before building
    - go mod tidy
    # Runs Go generate commands
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - 386
      - arm
      - arm64
    ldflags:
      - -s -w -X ecs-tool/installer.Version=v{{ .Version }}

archives:
  - format: tar.gz
    # Name template that uses the project name and OS/Arch
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # Use zip for Windows archives
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: DigitalTolk
    name: exec-ecs
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).

# Automatically publish a Homebrew formula to DigitalTolk/homebrew-tools on
# each tagged release. The action token (HOMEBREW_TAP_TOKEN) must be a PAT
# with `contents: write` on the tap repository — the default GITHUB_TOKEN
# cannot push to a different repo.
brews:
  - name: exec-ecs
    repository:
      owner: DigitalTolk
      name: homebrew-tools
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    homepage: "https://github.com/DigitalTolk/exec-ecs"
    description: "CLI that streamlines `aws ecs execute-command` against tasks across accounts and regions."
    license: "MIT"
    skip_upload: auto
    install: |
      bin.install "exec-ecs"
    test: |
      system "#{bin}/exec-ecs", "--version"
